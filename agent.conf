  <agent_config>
    <syscheck>
      <directories check_all="yes" realtime="yes">C:\Users\*\Downloads</directories>
    </syscheck>
    <sca>
      <enabled>yes</enabled>
      <scan_on_start>yes</scan_on_start>
      <interval>1h</interval>
      <policies>
        <policy>shared/disk_check.yml</policy>
      </policies>
    </sca>
    <localfile>
     <location>C:\Users\*\AppData\Local\SynologyDrive\logs\*.log</location>
     <log_format>syslog</log_format>
    </localfile>
  </agent_config>
